# Argus Status Page — Monitor Configuration
# Edit this file to configure your monitored sites, APIs, and WebSockets.
# After editing, run: npm run generate-config
# Then redeploy with: npm run deploy

[settings]
title = "Argus Status"
description = "System status and uptime monitoring"
history_days = 14

# ---------------------------------------------------------------------------
# monitors — add one [[monitors]] block per target
#
# Common fields (all monitor types):
#   id            string  — unique identifier (used as KV key; no spaces)
#   name          string  — display name on status page
#   description   string  — optional description
#   type          string  — "http" or "websocket"
#   url           string  — target URL
#   timeout_ms    number  — check timeout in milliseconds (default: 10000)
#
# HTTP-specific fields:
#   method              string  — HTTP method (default: "GET")
#   expect_status       number  — expected HTTP status code (default: 200)
#   follow_redirect     bool    — follow redirects (default: false)
#   expect_json_path    string  — dot-path into JSON body to assert (optional)
#   expect_json_value   string  — expected string value at expect_json_path (optional)
#
# WebSocket-specific fields:
#   ws_check_mode           string  — "connection" | "message" | "heartbeat"
#                                     connection: just verify upgrade handshake succeeds
#                                     message: wait for any message within timeout
#                                     heartbeat: send a message and expect a specific reply
#   heartbeat_message       string  — message to send (heartbeat mode only)
#   expect_heartbeat_reply  string  — expected reply substring (heartbeat mode only)
#   heartbeat_timeout_ms    number  — timeout for heartbeat reply (default: 5000)
# ---------------------------------------------------------------------------

[[monitors]]
id = "cloudflare"
name = "Cloudflare"
description = "Cloudflare homepage"
type = "http"
url = "https://www.cloudflare.com"
method = "GET"
expect_status = 200

[[monitors]]
id = "workers-docs"
name = "Workers Docs"
description = "Cloudflare Workers documentation"
type = "http"
url = "https://developers.cloudflare.com/workers/"
method = "GET"
expect_status = 200
follow_redirect = true

